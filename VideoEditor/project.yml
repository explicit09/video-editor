name: VideoEditor
options:
  bundleIdPrefix: com.videoeditor
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  EditorCore:
    path: Packages/EditorCore
  AIServices:
    path: Packages/AIServices
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

targets:
  VideoEditor:
    type: application
    platform: macOS
    sources:
      - path: VideoEditor
        excludes:
          - Resources
    resources:
      - path: VideoEditor/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.videoeditor.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: VideoEditor/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: VideoEditor/Resources/VideoEditor.entitlements
        SWIFT_VERSION: "6.0"
        ENABLE_PREVIEWS: "YES"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
    dependencies:
      - package: EditorCore
      - package: AIServices
      - package: Sentry
        product: Sentry

  VideoEditorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VideoEditorTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: VideoEditor
      - package: EditorCore
      - package: AIServices

schemes:
  VideoEditor:
    build:
      targets:
        VideoEditor: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: VideoEditorTests
        - package: EditorCore/EditorCoreTests
        - package: AIServices/AIServicesTests
    profile:
      config: Release
    analyze:
      config: Debug
